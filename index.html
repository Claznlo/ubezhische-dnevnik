<script>
(function(){
    let audioCtx = null, soundEnabled = true;
    function initAudio() { if(!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
    function playKeySound() { if(!soundEnabled) return; if(!audioCtx) { initAudio(); if(!audioCtx) return; } if(audioCtx.state === 'suspended') audioCtx.resume(); const osc = audioCtx.createOscillator(), gain = audioCtx.createGain(); osc.type = 'sine'; osc.frequency.value = 800; gain.gain.setValueAtTime(0.05, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.05); }
    function generateErrorBackground() { const bg = document.getElementById('errorBackground'); if(!bg) return; const errors = ['[КРИТ] Паника ядра', '[ОШИБКА] Сегфолт', '[ПРЕД] Переполнение стека']; for(let i=0; i<30; i++) { const line = document.createElement('div'); line.className = 'error-line'; line.textContent = errors[Math.floor(Math.random()*errors.length)]; line.style.top = (i*30)+'px'; line.style.animationDelay = (Math.random()*20)+'s'; bg.appendChild(line); } }
    function encode(str) { return btoa(encodeURIComponent(str)); }
    function decode(str) { return decodeURIComponent(atob(str)); }
    
    let users = [{ id: "admin_1", login: "Clanzlo_", password: encode("32707"), role: "admin", name: "Clanzlo_", createdAt: new Date().toISOString() }];
    let currentUser = null;
    let groups = { 'default': { name: 'ОСНОВНАЯ', players: [], matrix: [], dates: [], dateNotes: {}, photos: {} } };
    let currentGroup = 'default';
    let PLAYERS = [], dates = [], matrix = [], dateNotes = {}, datePhotos = {};
    let actionLog = []; let searchTerm = ''; let selectedCells = new Set(); let activePopup = null;
    let globalNotes = localStorage.getItem('error_global_notes') || '';
    let calendarDisplayMonth = new Date().getMonth(), calendarDisplayYear = new Date().getFullYear();
    
    const STATUS_MAP = { dash: { display:'ПУСТО', full:'[ПУСТО] НЕТ ДАННЫХ', class:'ERR_NULL' }, yes_was: { display:'БЫЛ', full:'[OK] ПРИСУТСТВОВАЛ', class:'ERR_YES' }, no_was: { display:'НЕ БЫЛ', full:'[ОШБ] ОТСУТСТВОВАЛ', class:'ERR_NO' }, vacation: { display:'ОТПУСК', full:'[ОТП] В ОТПУСКЕ', class:'ERR_VAC' }, yes_reported: { display:'ОТПИС+', full:'[ОТП] ОТПИСАЛСЯ', class:'ERR_REPORTED' }, no_notreported: { display:'ОТПИС-', full:'[ОТП] НЕ ОТПИСАЛСЯ', class:'ERR_NOT_REPORTED' } };
    const WEEKDAYS = ['ВСК','ПНД','ВТР','СРД','ЧТВ','ПТН','СБТ'];
    
    function getDateKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
    function isToday(d) { const t = new Date(); return d.getDate()===t.getDate() && d.getMonth()===t.getMonth() && d.getFullYear()===t.getFullYear(); }
    function getSeason() { const m = new Date().getMonth(); if(m>=2&&m<=4)return{name:'ВЕСНА',emoji:'🌸'}; if(m>=5&&m<=7)return{name:'ЛЕТО',emoji:'☀️'}; if(m>=8&&m<=10)return{name:'ОСЕНЬ',emoji:'🍂'}; return{name:'ЗИМА',emoji:'❄️'}; }
    function formatDateTime() { const n=new Date(); const s=getSeason(); return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')} [${s.name}] ${s.emoji}`; }
    function formatDate(d) { return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}`; }
    function formatFullDateTime() { const n=new Date(); return `${String(n.getDate()).padStart(2,'0')}.${String(n.getMonth()+1).padStart(2,'0')}.${n.getFullYear()} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`; }
    function showToast(msg, type='ИНФО') { const c = document.getElementById('toastContainer'); const t = document.createElement('div'); t.className = 'error-toast'; t.innerHTML = `[${type}] ${msg}`; c.appendChild(t); setTimeout(()=>t.remove(), 3000); }
    function closePopup() { if(activePopup) { activePopup.remove(); activePopup = null; } if(window._closeHandler) { document.removeEventListener('click', window._closeHandler); window._closeHandler = null; } }
    function addLog(action, details) { const n = new Date(); const ts = `${String(n.getDate()).padStart(2,'0')}.${String(n.getMonth()+1).padStart(2,'0')} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`; actionLog.unshift({ id: Date.now()+Math.random(), action, details, user: currentUser?.login||'ГОСТЬ', time: ts, snapshot: { matrix: JSON.parse(JSON.stringify(matrix)), dates: [...dates], players: [...PLAYERS] } }); if(actionLog.length>100) actionLog = actionLog.slice(0,100); localStorage.setItem('error_journal_log', JSON.stringify(actionLog)); }

    function importFromCSV(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const text = e.target.result;
                const lines = text.split('\n').filter(l => l.trim());
                if(lines.length < 2) { showToast('Файл пуст', 'ОШИБКА'); return; }
                const headers = lines[0].split(';');
                const newDates = [];
                for(let i = 1; i < headers.length; i++) {
                    const parts = headers[i].trim().split('.');
                    if(parts.length === 2) {
                        const d = new Date(); d.setDate(parseInt(parts[0])); d.setMonth(parseInt(parts[1])-1); d.setHours(0,0,0,0);
                        newDates.push(d);
                    }
                }
                if(newDates.length === 0) { showToast('Не найдены даты', 'ОШИБКА'); return; }
                const newPlayers = []; const newMatrix = [];
                for(let i = 1; i < lines.length; i++) {
                    const cols = lines[i].split(';'); if(cols.length < 2) continue;
                    const name = cols[0].trim(); if(!name) continue;
                    newPlayers.push(name);
                    const row = [];
                    for(let j = 1; j <= newDates.length; j++) {
                        const val = (cols[j] || '').trim().toLowerCase();
                        if(val.includes('был')||val==='✅') row.push('yes_was');
                        else if(val.includes('не был')||val==='❌') row.push('no_was');
                        else if(val.includes('отп')&&!val.includes('не отп')) row.push('vacation');
                        else if(val.includes('отпис')||val==='📢') row.push('yes_reported');
                        else if(val.includes('не отпис')||val==='🔇') row.push('no_notreported');
                        else row.push('dash');
                    }
                    newMatrix.push(row);
                }
                if(newPlayers.length === 0) { showToast('Не найдены игроки', 'ОШИБКА'); return; }
                PLAYERS = newPlayers; dates = newDates; matrix = newMatrix;
                saveCurrentGroup(); renderTable(); renderCalendar(); renderGroupsBar();
                showToast(`Импортировано: ${PLAYERS.length} игроков, ${dates.length} дней`, 'ИМПОРТ');
            } catch(err) { showToast('Ошибка чтения файла', 'ОШИБКА'); }
        };
        reader.readAsText(file, 'UTF-8');
    }

        const app = document.getElementById('app'); 
        if(!currentUser) { 
            app.innerHTML = `<div class="login-screen"><h2>ДОСТУП К ТЕРМИНАЛУ</h2><input type="text" id="loginInput" class="login-input" placeholder="ЛОГИН"><input type="password" id="passwordInput" class="login-input" placeholder="ПАРОЛЬ"><button class="login-btn" id="loginBtn">[ВОЙТИ]</button><button class="guest-btn" id="guestBtn">[ГОСТЬ]</button><div id="loginError" style="color:#ff0000;margin-top:10px;"></div></div>`; 
            document.getElementById('loginBtn').onclick=()=>{ initAudio(); const l=document.getElementById('loginInput').value, p=document.getElementById('passwordInput').value; const u=users.find(x=>x.login===l && decode(x.password)===p); if(u){ currentUser={...u,password:undefined}; localStorage.setItem('error_journal_user',JSON.stringify({id:u.id,login:u.login,role:u.role})); loadData(); render(); } else document.getElementById('loginError').innerText='[ОШИБКА] ДОСТУП ЗАПРЕЩЕН'; }; 
            document.getElementById('guestBtn').onclick=()=>{ currentUser={role:'viewer',login:'ГОСТЬ'}; loadData(); render(); }; 
            return; 
        } 
        const isAdmin = currentUser.role==='admin', isViewer = currentUser.role==='viewer'; 
        app.innerHTML = `<div class="app-container"><div class="tabs-container"><button class="tab-terminal active" data-tab="journal">[ЖУРНАЛ]</button><button class="tab-terminal" data-tab="calendar">[КАЛЕНДАРЬ]</button>${isAdmin?'<button class="tab-terminal" data-tab="admin">[УПРАВЛЕНИЕ]</button>':''}<button class="tab-terminal" data-tab="history">[ИСТОРИЯ]</button></div><div class="terminal-card"><div class="error-header"><h1>ERROR ЖУРНАЛ</h1><div style="display:flex;justify-content:space-between;margin-top:15px;"><div class="stats-terminal"><div class="stat-block"><span class="stat-label">[ИГРОКИ]</span><span class="stat-value">${PLAYERS.length}</span></div><div class="stat-block"><span class="stat-label">[ДНИ]</span><span class="stat-value">${dates.length}</span></div><div class="stat-block"><span class="stat-label">[СИСТ_ВРЕМЯ]</span><span class="stat-value" id="sysTime">${formatDateTime()}</span></div></div><div style="display:flex; gap:10px;"><button class="error-btn" id="soundToggle">🔊</button><button class="error-btn" id="logoutBtn">[ВЫХОД]</button></div></div></div><div id="groupsBar" class="groups-bar" style="padding:10px 20px;background:var(--bg-tertiary);border-bottom:1px solid var(--border-dim);"></div><input type="file" id="fileInput" class="file-input" accept=".csv"><div id="journalTab" class="tab-content">${!isViewer?`<div style="padding:20px;display:flex;gap:20px;border-bottom:1px solid var(--border-dim);"><input type="text" id="newPlayerName" class="terminal-input" placeholder="ИМЯ_ИГРОКА" style="width:200px;"><button class="error-btn" id="addPlayerBtn">[ДОБАВИТЬ]</button><button class="error-btn" id="addDayBtn">[+ДЕНЬ]</button></div>`:''}<div style="padding:20px;border-bottom:1px solid var(--border-dim);"><input type="text" id="searchInput" class="terminal-input" placeholder="ПОИСК" style="width:200px;"><button class="error-btn" id="searchBtn">[ПОИСК]</button><button class="error-btn" id="clearSearchBtn">[ОЧИСТИТЬ]</button></div><div class="virtual-scroll-container"><table class="memory-dump-table" id="diaryTable"><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table></div><div style="padding:20px;border-top:1px solid var(--border-dim);display:flex;gap:15px;flex-wrap:wrap;">${Object.entries(STATUS_MAP).map(([k,v])=>`<div style="display:flex;align-items:center;gap:5px;"><span class="status-${v.class}" style="padding:5px 10px;">${v.display}</span><span style="color:var(--text-muted);">${v.full}</span></div>`).join('')}</div></div><div id="calendarTab" class="tab-content hidden"><div id="calendarContent" class="calendar-container"></div></div>${isAdmin?'<div id="adminTab" class="tab-content hidden"><div id="adminContent" style="padding:20px;"></div></div>':''}</div></div><div class="notes-button" id="notesToggle">💬</div><div class="notes-panel" id="notesPanel"><textarea class="notes-textarea" id="globalNotes" placeholder="Заметки куратора...">${globalNotes}</textarea><button class="error-btn" id="saveNotesBtn" style="width:100%;">[СОХРАНИТЬ]</button></div>`; 
        renderGroupsBar(); renderTable(); renderCalendar(); generateErrorBackground(); 
        document.getElementById('notesToggle').onclick = () => document.getElementById('notesPanel').classList.toggle('show'); 
        document.getElementById('saveNotesBtn').onclick = () => { globalNotes = document.getElementById('globalNotes').value; localStorage.setItem('error_global_notes', globalNotes); document.getElementById('notesPanel').classList.remove('show'); showToast('Заметки сохранены', 'УСПЕШНО'); }; 
        document.getElementById('soundToggle').onclick = function() { soundEnabled = !soundEnabled; this.textContent = soundEnabled ? '🔊' : '🔇'; localStorage.setItem('error_sound', soundEnabled); if(soundEnabled) initAudio(); }; 
        const savedSound = localStorage.getItem('error_sound'); if(savedSound !== null) { soundEnabled = savedSound === 'true'; document.getElementById('soundToggle').textContent = soundEnabled ? '🔊' : '🔇'; if(soundEnabled) initAudio(); } else { initAudio(); } 
        document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('error_journal_user'); currentUser = null; render(); }; 
        document.querySelectorAll('.tab-terminal').forEach(t => t.onclick = () => { document.querySelectorAll('.tab-terminal').forEach(x => x.classList.remove('active')); t.classList.add('active'); const j = document.getElementById('journalTab'), c = document.getElementById('calendarTab'), a = document.getElementById('adminTab'); j.classList.add('hidden'); c.classList.add('hidden'); if(a) a.classList.add('hidden'); if(t.dataset.tab === 'journal') j.classList.remove('hidden'); else if(t.dataset.tab === 'calendar') { c.classList.remove('hidden'); renderCalendar(); } else if(t.dataset.tab === 'admin') { if(a) a.classList.remove('hidden'); renderAdmin(); } else if(t.dataset.tab === 'history') { showHistory(); document.querySelector('[data-tab="journal"]').classList.add('active'); t.classList.remove('active'); j.classList.remove('hidden'); } }); 
        if(!isViewer) { document.getElementById('addPlayerBtn').onclick = () => { const n = document.getElementById('newPlayerName').value.trim(); if(n) { PLAYERS.push(n); matrix.push(dates.map(() => 'dash')); saveCurrentGroup(); renderTable(); renderGroupsBar(); document.getElementById('newPlayerName').value = ''; addLog('ИГРОК_ДОБАВЛЕН', n); playKeySound(); } }; 
        document.getElementById('addDayBtn').onclick = () => { addDay(); playKeySound(); }; } 
        document.getElementById('searchBtn').onclick = () => { searchTerm = document.getElementById('searchInput').value.trim().toLowerCase(); renderTable(); playKeySound(); }; 
        document.getElementById('clearSearchBtn').onclick = () => { document.getElementById('searchInput').value = ''; searchTerm = ''; renderTable(); playKeySound(); }; 
        document.querySelectorAll('input').forEach(i => i.addEventListener('keydown', (e) => { if(e.key.length === 1 || e.key === 'Backspace') playKeySound(); })); 
        setInterval(() => { const e = document.getElementById('sysTime'); if(e) e.textContent = formatDateTime(); }, 1000); 
    }
    
    function loadUsers() { const s = localStorage.getItem('error_journal_users'); if(s) users = JSON.parse(s); }
    function loadSession() { const s = localStorage.getItem('error_journal_user'); if(s) { const d = JSON.parse(s); const u = users.find(x => x.id === d.id); if(u) currentUser = {...u, password:undefined}; } loadData(); }
    loadUsers(); loadSession(); render();
})();
</script>
</body>
</html>
