<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Убежище Балдежа | Синхронизация</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: Arial; background: #f0f2f5; padding: 20px; }
        .login-box { max-width: 300px; margin: 50px auto; background: white; padding: 20px; border-radius: 10px; }
        input, button { width: 100%; padding: 8px; margin: 5px 0; }
        button { background: #2a5298; color: white; border: none; cursor: pointer; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        th:first-child, td:first-child { text-align: left; }
        .status-yes { background: #28a745; color: white; }
        .status-no { background: #dc3545; color: white; }
        .status-vacation { background: #6c757d; color: white; }
        .status-left { background: #343a40; color: white; }
        .status-dash { background: #e9ecef; }
        .header { background: #1e3c72; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .stats { margin: 15px 0; }
        .sync-status { font-size: 12px; margin-left: 10px; color: #ffd966; }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // ========== FIREBASE КЛЮЧИ ==========
    const firebaseConfig = {
        apiKey: "AIzaSyBLFoSs5GJa80f37A8xAq4k6qNxiQ0KAMk",
        authDomain: "ubezhische-sync.firebaseapp.com",
        projectId: "ubezhische-sync",
        storageBucket: "ubezhische-sync.firebasestorage.app",
        messagingSenderId: "569166999975",
        appId: "1:569166999975:web:0413aab6127ce30c758682"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const ROOM_ID = "ubezhische_main";
    
    let currentUser = null;
    let PLAYERS = [];
    let dates = [];
    let matrix = [];
    
    const STATUSES = ['dash', 'yes', 'no', 'vacation', 'left'];
    const STATUS_NAMES = { dash: '—', yes: 'Да', no: 'Нет', vacation: 'Отпуск', left: 'Выбыл' };
    const WEEKDAYS = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
    
    function formatDate(d) { return `${d.getDate()}.${d.getMonth()+1}`; }
    function getWeekday(d) { return WEEKDAYS[d.getDay()]; }
    function generateDates() { let d=[]; let t=new Date(); for(let i=6;i>=0;i--) { let nd=new Date(t); nd.setDate(t.getDate()-i); d.push(nd); } return d; }
    
    async function saveToFirebase() {
        try {
            await db.collection('diaries').doc(ROOM_ID).set({
                players: PLAYERS,
                dates: dates.map(d=>d.toISOString()),
                matrix: matrix,
                lastUpdated: new Date().toISOString()
            });
            document.getElementById('syncStatus') && (document.getElementById('syncStatus').innerHTML = '☁️ Синхронизировано');
        } catch(e) {
            console.error('Ошибка сохранения:', e);
            document.getElementById('syncStatus') && (document.getElementById('syncStatus').innerHTML = '⚠️ Ошибка');
        }
    }
    
    async function loadFromFirebase() {
        try {
            const doc = await db.collection('diaries').doc(ROOM_ID).get();
            if(doc.exists) {
                const data = doc.data();
                PLAYERS = data.players || [];
                dates = (data.dates || []).map(d=>new Date(d));
                matrix = data.matrix || [];
                console.log('✅ Загружено из Firebase, игроков:', PLAYERS.length);
                document.getElementById('syncStatus') && (document.getElementById('syncStatus').innerHTML = '☁️ Синхронизировано');
            } else {
                console.log('📭 Новый документ');
                dates = generateDates();
                await saveToFirebase();
            }
        } catch(e) {
            console.error('Ошибка загрузки:', e);
            dates = generateDates();
        }
        if(dates.length===0) dates = generateDates();
        if(matrix.length!==PLAYERS.length && PLAYERS.length>0) {
            matrix = PLAYERS.map(()=>dates.map(()=>'dash'));
        }
        render();
    }
    
    function render() {
        if(!currentUser) {
            document.getElementById('app').innerHTML = `
                <div class="login-box">
                    <h2>📖 Убежище Балдежа</h2>
                    <input type="text" id="login" placeholder="Логин">
                    <input type="password" id="password" placeholder="Пароль">
                    <button id="loginBtn">Войти</button>
                    <button id="guestBtn">👀 Наблюдатель</button>
                    <div id="error" style="color:red; margin-top:10px;"></div>
                </div>
            `;
            document.getElementById('loginBtn').onclick = () => {
                if(document.getElementById('login').value === 'Clanzlo_' && document.getElementById('password').value === '32707') {
                    currentUser = { login: 'Clanzlo_', role: 'admin' };
                    loadFromFirebase();
                } else {
                    document.getElementById('error').innerText = 'Неверный логин или пароль';
                }
            };
            document.getElementById('guestBtn').onclick = () => {
                currentUser = { login: 'Наблюдатель', role: 'viewer' };
                loadFromFirebase();
            };
            return;
        }
        
        const isViewer = currentUser.role === 'viewer';
        
        let html = `
            <div class="header">
                <h1>📖 УБЕЖИЩЕ БАЛДЕЖА <span id="syncStatus" class="sync-status">☁️ Загрузка...</span></h1>
                <div>${currentUser.role === 'admin' ? '👑' : '👀'} ${currentUser.login} <button id="logoutBtn" style="background:rgba(255,255,255,0.3); border:none; color:white; padding:5px 10px;">Выйти</button></div>
            </div>
            <div style="padding:20px;">
                ${!isViewer ? `
                <div style="margin-bottom:20px;">
                    <input type="text" id="newPlayer" placeholder="Никнейм игрока">
                    <button id="addPlayerBtn">➕ Добавить игрока</button>
                    <button id="addDayBtn">➕ Добавить день</button>
                    <button id="removeDayBtn">✖️ Удалить день</button>
                </div>
                ` : ''}
                <div class="stats">👥 Игроков: ${PLAYERS.length} | 📅 Дней: ${dates.length}</div>
                <div style="overflow-x:auto;">
                      <table>
                        <thead>   <th>Игрок</th>${dates.map(d=>`<th>${formatDate(d)}<br>${getWeekday(d)}</th>`).join('')} </thead>
                        <tbody>
                            ${PLAYERS.map((p,i)=>`
                                  <tr>
                                     <td>${p}</td>
                                    ${dates.map((_,j)=>`<td class="status-${matrix[i]?.[j]||'dash'}" data-player="${i}" data-day="${j}">${STATUS_NAMES[matrix[i]?.[j]||'dash']}</td>`).join('')}
                                  </tr>
                            `).join('')}
                        </tbody>
                      </table>
                </div>
                <div style="margin-top:10px; font-size:12px; color:gray;">💡 Кликните по ячейке для изменения статуса</div>
            </div>
        `;
        document.getElementById('app').innerHTML = html;
        
        if(!isViewer) {
            document.getElementById('addPlayerBtn').onclick = async () => {
                const name = document.getElementById('newPlayer').value.trim();
                if(!name) return alert('Введите ник');
                PLAYERS.push(name);
                matrix.push(dates.map(()=>'dash'));
                await saveToFirebase();
                render();
                document.getElementById('newPlayer').value = '';
            };
            document.getElementById('addDayBtn').onclick = async () => {
                const last = dates[dates.length-1];
                const newDate = last ? new Date(last) : new Date();
                if(last) newDate.setDate(last.getDate()+1);
                dates.push(newDate);
                PLAYERS.forEach((_,i)=> matrix[i].push('dash'));
                await saveToFirebase();
                render();
            };
            document.getElementById('removeDayBtn').onclick = async () => {
                if(dates.length<=1) return alert('Нельзя удалить последний день');
                dates.pop();
                PLAYERS.forEach((_,i)=> matrix[i].pop());
                await saveToFirebase();
                render();
            };
        }
        document.getElementById('logoutBtn').onclick = () => { currentUser=null; render(); };
        
        document.querySelectorAll('td[data-player]').forEach(td => {
            td.onclick = async () => {
                const i = parseInt(td.dataset.player);
                const j = parseInt(td.dataset.day);
                const current = matrix[i][j];
                const next = STATUSES[(STATUSES.indexOf(current)+1)%STATUSES.length];
                matrix[i][j] = next;
                await saveToFirebase();
                render();
            };
        });
    }
    
    loadFromFirebase();
</script>
</body>
</html>
